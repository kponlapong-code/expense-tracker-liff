name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://expense-tracker-e50t.onrender.com/health)
          echo "Status: $STATUS"
          if [ "$STATUS" = "200" ]; then echo "Server is awake!"; fi
