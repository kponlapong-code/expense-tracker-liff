<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>💰 บันทึกรายรับ-รายจ่าย</title>
<style>
  :root {
    --primary: #6C63FF;
    --primary-light: #EEF0FF;
    --income: #22C55E;
    --income-light: #DCFCE7;
    --expense: #EF4444;
    --expense-light: #FEE2E2;
    --balance: #6C63FF;
    --warning: #F59E0B;
    --bg: #F8F9FC;
    --card: #FFFFFF;
    --text: #1E1B4B;
    --muted: #6B7280;
    --border: #E5E7EB;
    --radius: 16px;
    --shadow: 0 2px 16px rgba(108,99,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  header { background: var(--primary); color: white; padding: 20px 24px 40px; }
  header h1 { font-size: 1.5rem; font-weight: 700; }
  header p { opacity: 0.8; font-size: 0.9rem; margin-top: 4px; }

  main { max-width: 860px; margin: -24px auto 0; padding: 0 16px 100px; }

  /* Cards */
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }

  /* Summary Grid - 3 cards */
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .summary-item { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; text-align: center; border-top: 4px solid var(--border); }
  .summary-item.income-card { border-top-color: var(--income); }
  .summary-item.expense-card { border-top-color: var(--expense); }
  .summary-item.balance-card { border-top-color: var(--primary); }
  .summary-item .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-item .amount { font-size: 1.3rem; font-weight: 700; }
  .summary-item.income-card .amount { color: var(--income); }
  .summary-item.expense-card .amount { color: var(--expense); }
  .summary-item.balance-card .amount { color: var(--primary); }
  .summary-item .sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .toolbar h2 { font-size: 1rem; font-weight: 600; flex: 1; }
  select, input[type="month"], input[type="text"], input[type="number"], input[type="date"] {
    border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 0.9rem;
    background: white; color: var(--text); outline: none; transition: border-color 0.2s;
  }
  select:focus, input:focus { border-color: var(--primary); }

  /* Buttons */
  .btn { border: none; border-radius: 10px; padding: 9px 18px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: #5B53E0; }
  .btn-income { background: var(--income); color: white; }
  .btn-income:hover { background: #16A34A; }
  .btn-expense { background: var(--expense); color: white; }
  .btn-expense:hover { background: #DC2626; }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger { background: #FEE2E2; color: var(--expense); }
  .btn-danger:hover { background: var(--expense); color: white; }

  /* Type Toggle */
  .type-toggle { display: flex; background: var(--bg); border-radius: 12px; padding: 4px; gap: 4px; margin-bottom: 16px; }
  .type-toggle button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted); }
  .type-toggle button.active-income { background: var(--income); color: white; }
  .type-toggle button.active-expense { background: var(--expense); color: white; }

  /* Expense List */
  .expense-list { list-style: none; }
  .expense-item { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .expense-item:last-child { border-bottom: none; }
  .expense-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
  .expense-icon.income { background: var(--income-light); }
  .expense-icon.expense { background: var(--expense-light); }
  .expense-info { flex: 1; min-width: 0; }
  .expense-info .cat { font-weight: 600; font-size: 0.95rem; }
  .expense-info .desc { font-size: 0.8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .expense-info .date { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .expense-amount { font-size: 1.05rem; font-weight: 700; flex-shrink: 0; }
  .expense-amount.income { color: var(--income); }
  .expense-amount.expense { color: var(--expense); }
  .expense-actions { display: flex; gap: 4px; flex-shrink: 0; }

  /* Type Badge */
  .type-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
  .type-badge.income { background: var(--income-light); color: var(--income); }
  .type-badge.expense { background: var(--expense-light); color: var(--expense); }

  /* Filter tabs */
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-tab { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--muted); }
  .filter-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
  .filter-tab.income-tab.active { background: var(--income); border-color: var(--income); }
  .filter-tab.expense-tab.active { background: var(--expense); border-color: var(--expense); }

  /* Chart */
  .chart-bars { display: flex; gap: 4px; height: 80px; align-items: flex-end; margin-top: 12px; }
  .chart-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
  .chart-bar-group { display: flex; gap: 2px; width: 100%; align-items: flex-end; }
  .chart-bar { border-radius: 4px 4px 0 0; min-height: 2px; flex: 1; transition: height 0.3s; }
  .chart-bar.income { background: var(--income); }
  .chart-bar.expense { background: var(--expense); }
  .chart-label { font-size: 0.65rem; color: var(--muted); }
  .chart-legend { display: flex; gap: 16px; margin-top: 8px; justify-content: center; }
  .chart-legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.75rem; color: var(--muted); }
  .chart-legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: white; font-size: 1.8rem; border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(108,99,255,0.4); display: flex; align-items: center; justify-content: center; transition: transform 0.2s; z-index: 100; }
  .fab:hover { transform: scale(1.1); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
  .modal { background: white; border-radius: 20px; padding: 24px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 1.2rem; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { font-size: 0.85rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px; }
  .form-group input, .form-group select { width: 100%; }
  .modal-footer { display: flex; gap: 8px; margin-top: 20px; }
  .modal-footer .btn { flex: 1; }
  .hidden { display: none !important; }

  /* Toast */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1E1B4B; color: white; padding: 12px 24px; border-radius: 12px; font-size: 0.9rem; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* Empty state */
  .empty { text-align: center; padding: 40px; color: var(--muted); }
  .empty .emoji { font-size: 2.5rem; margin-bottom: 8px; }

  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .summary-item { padding: 12px 8px; }
    .summary-item .amount { font-size: 1rem; }
    .summary-item .label { font-size: 0.65rem; }
  }
</style>
</head>
<body>

<header>
  <h1>💰 รายรับ-รายจ่าย</h1>
  <p id="header-date">โหลดข้อมูล...</p>
</header>

<main>
  <!-- Summary Cards -->
  <div class="summary-grid">
    <div class="summary-item income-card">
      <div class="label">💚 รายรับ</div>
      <div class="amount" id="total-income">0</div>
      <div class="sub">บาท</div>
    </div>
    <div class="summary-item expense-card">
      <div class="label">❤️ รายจ่าย</div>
      <div class="amount" id="total-expense">0</div>
      <div class="sub">บาท</div>
    </div>
    <div class="summary-item balance-card">
      <div class="label">💜 คงเหลือ</div>
      <div class="amount" id="total-balance">0</div>
      <div class="sub">บาท</div>
    </div>
  </div>

  <!-- Chart Card -->
  <div class="card">
    <div class="toolbar">
      <h2>📊 รายรับ-รายจ่ายรายวัน</h2>
      <input type="month" id="month-picker" />
    </div>
    <div class="chart-bars" id="chart-bars"></div>
    <div class="chart-legend">
      <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--income)"></div>รายรับ</div>
      <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--expense)"></div>รายจ่าย</div>
    </div>
  </div>

  <!-- List Card -->
  <div class="card">
    <div class="toolbar">
      <h2>📋 รายการ</h2>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">ทั้งหมด</button>
      <button class="filter-tab income-tab" data-filter="income" onclick="setFilter('income',this)">💚 รายรับ</button>
      <button class="filter-tab expense-tab" data-filter="expense" onclick="setFilter('expense',this)">❤️ รายจ่าย</button>
    </div>
    <ul class="expense-list" id="expense-list">
      <li class="empty"><div class="emoji">📭</div><div>ยังไม่มีรายการ</div></li>
    </ul>
  </div>
</main>

<!-- FAB -->
<button class="fab" onclick="openModal()">＋</button>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <h3 id="modal-title">➕ เพิ่มรายการ</h3>

    <!-- Type Toggle -->
    <div class="type-toggle">
      <button id="toggle-income" onclick="setModalType('income')">💚 รายรับ</button>
      <button id="toggle-expense" onclick="setModalType('expense')">❤️ รายจ่าย</button>
    </div>

    <div class="form-group">
      <label>จำนวนเงิน (บาท) *</label>
      <input type="number" id="f-amount" placeholder="0.00" step="0.01" min="0.01" />
    </div>
    <div class="form-group">
      <label>หมวดหมู่</label>
      <select id="f-category"></select>
    </div>
    <div class="form-group">
      <label>รายละเอียด</label>
      <input type="text" id="f-description" placeholder="เช่น ค่าอาหารกลางวัน" />
    </div>
    <div class="form-group">
      <label>วันที่ *</label>
      <input type="date" id="f-date" />
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" id="modal-submit" onclick="submitForm()">บันทึก</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
let currentMonth = new Date().toISOString().slice(0,7);
let currentFilter = 'all';
let editingId = null;
let modalType = 'expense';
let allExpenses = [];

const EXPENSE_CATEGORIES = ['ค่าอาหาร','ค่าเสื้อผ้า','ค่าเครื่องสำอาง','ค่าของใช้ในบ้าน','เงินลงทุน','ค่าดูแลพ่อแม่','ค่าโทรศัพท์','ค่าน้ำมัน','ค่างานบ้าน','ค่าสันทนาการ','ค่าความรู้','ลูกชาย','อื่นๆ'];
const INCOME_CATEGORIES  = ['เงินเดือน','รายได้อื่นๆ'];

const CAT_ICONS = {
  'ค่าอาหาร':'🍜','ค่าเสื้อผ้า':'👗','ค่าเครื่องสำอาง':'💄',
  'ค่าของใช้ในบ้าน':'🏠','เงินลงทุน':'📈','ค่าดูแลพ่อแม่':'🧡',
  'ค่าโทรศัพท์':'📱','ค่าน้ำมัน':'⛽','ค่างานบ้าน':'🧹',
  'ค่าสันทนาการ':'🎉','ค่าความรู้':'📚','ลูกชาย':'👦',
  'เงินเดือน':'💼','รายได้อื่นๆ':'💰','อื่นๆ':'📦',
};

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  const picker = document.getElementById('month-picker');
  picker.value = currentMonth;
  picker.addEventListener('change', e => { currentMonth = e.target.value; loadAll(); });
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  setModalType('expense');
  loadAll();
});

async function loadAll() {
  await Promise.all([loadSummary(), loadChart(), loadExpenses()]);
}

// ── Summary ──
async function loadSummary() {
  const res = await fetch(`/api/summary/month?month=${currentMonth}`);
  const d = await res.json();
  const fmt = n => Number(n).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
  document.getElementById('total-income').textContent = fmt(d.income||0);
  document.getElementById('total-expense').textContent = fmt(d.expense||0);
  const bal = (d.balance||0);
  const balEl = document.getElementById('total-balance');
  balEl.textContent = fmt(bal);
  balEl.style.color = bal >= 0 ? 'var(--income)' : 'var(--expense)';

  const [y, m] = currentMonth.split('-');
  const monthNames = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('header-date').textContent = `${monthNames[parseInt(m)-1]} ${parseInt(y)+543}`;
}

// ── Chart ──
async function loadChart() {
  const res = await fetch(`/api/summary/daily?month=${currentMonth}`);
  const d = await res.json();
  const bars = document.getElementById('chart-bars');
  bars.innerHTML = '';
  if (!d.daily || d.daily.length === 0) return;

  const maxVal = Math.max(...d.daily.map(r => Math.max(r.income||0, r.expense||0)), 1);
  d.daily.forEach(r => {
    const day = r.expense_date.slice(8);
    const incH = Math.round(((r.income||0) / maxVal) * 70);
    const expH = Math.round(((r.expense||0) / maxVal) * 70);
    const col = document.createElement('div');
    col.className = 'chart-col';
    col.innerHTML = `
      <div class="chart-bar-group">
        <div class="chart-bar income" style="height:${incH}px" title="รายรับ ${r.income}"></div>
        <div class="chart-bar expense" style="height:${expH}px" title="รายจ่าย ${r.expense}"></div>
      </div>
      <div class="chart-label">${parseInt(day)}</div>`;
    bars.appendChild(col);
  });
}

// ── List ──
async function loadExpenses() {
  let url = `/api/expenses?month=${currentMonth}&limit=100`;
  if (currentFilter !== 'all') url += `&type=${currentFilter}`;
  const res = await fetch(url);
  allExpenses = await res.json();
  renderList(allExpenses);
}

function renderList(items) {
  const ul = document.getElementById('expense-list');
  if (!items || items.length === 0) {
    ul.innerHTML = '<li class="empty"><div class="emoji">📭</div><div>ยังไม่มีรายการ</div></li>';
    return;
  }
  ul.innerHTML = items.map(e => {
    const isIncome = e.type === 'income';
    const icon = CAT_ICONS[e.category] || '📦';
    const sign = isIncome ? '+' : '-';
    const cls  = isIncome ? 'income' : 'expense';
    const fmt  = n => Number(n).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
    const desc = e.description || e.recipient || '';
    return `
      <li class="expense-item">
        <div class="expense-icon ${cls}">${icon}</div>
        <div class="expense-info">
          <div class="cat">${e.category} <span class="type-badge ${cls}">${isIncome ? 'รายรับ' : 'รายจ่าย'}</span></div>
          ${desc ? `<div class="desc">${desc}</div>` : ''}
          <div class="date">${e.expense_date}</div>
        </div>
        <div class="expense-amount ${cls}">${sign}${fmt(e.amount)}</div>
        <div class="expense-actions">
          <button class="btn btn-ghost btn-sm" onclick="editExpense(${e.id})">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteExpense(${e.id})">🗑️</button>
        </div>
      </li>`;
  }).join('');
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadExpenses();
}

// ── Modal ──
function setModalType(type) {
  modalType = type;
  const cats = type === 'income' ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
  const sel = document.getElementById('f-category');
  sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');

  document.getElementById('toggle-income').className  = type === 'income'  ? 'active-income'  : '';
  document.getElementById('toggle-expense').className = type === 'expense' ? 'active-expense' : '';

  const btn = document.getElementById('modal-submit');
  btn.className = type === 'income' ? 'btn btn-income' : 'btn btn-expense';
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? '✏️ แก้ไขรายการ' : '➕ เพิ่มรายการ';
  if (!id) {
    document.getElementById('f-amount').value = '';
    document.getElementById('f-description').value = '';
    document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
    setModalType('expense');
  }
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); editingId = null; }
function closeModalOnBg(e) { if (e.target.id === 'modal-overlay') closeModal(); }

async function editExpense(id) {
  const e = allExpenses.find(x => x.id === id);
  if (!e) return;
  openModal(id);
  setModalType(e.type || 'expense');
  document.getElementById('f-amount').value = e.amount;
  document.getElementById('f-description').value = e.description || '';
  document.getElementById('f-date').value = e.expense_date;
  // set category
  const sel = document.getElementById('f-category');
  for (let opt of sel.options) { if (opt.value === e.category) { opt.selected = true; break; } }
}

async function submitForm() {
  const amount = parseFloat(document.getElementById('f-amount').value);
  if (!amount || amount <= 0) { showToast('❌ กรุณากรอกจำนวนเงิน'); return; }
  const date = document.getElementById('f-date').value;
  if (!date) { showToast('❌ กรุณาเลือกวันที่'); return; }

  const body = {
    type: modalType,
    amount,
    category: document.getElementById('f-category').value,
    description: document.getElementById('f-description').value || null,
    expense_date: date,
    source: 'manual',
  };

  const url    = editingId ? `/api/expenses/${editingId}` : '/api/expenses';
  const method = editingId ? 'PUT' : 'POST';
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (res.ok) {
    closeModal();
    showToast(editingId ? '✅ แก้ไขแล้ว' : '✅ บันทึกแล้ว');
    loadAll();
  } else {
    showToast('❌ เกิดข้อผิดพลาด');
  }
}

async function deleteExpense(id) {
  if (!confirm('ลบรายการนี้?')) return;
  const res = await fetch(`/api/expenses/${id}`, { method: 'DELETE' });
  if (res.ok) { showToast('🗑️ ลบแล้ว'); loadAll(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
