<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>💰 บันทึกค่าใช้จ่าย</title>
<style>
  :root {
    --primary: #6C63FF;
    --primary-light: #EEF0FF;
    --success: #22C55E;
    --danger: #EF4444;
    --warning: #F59E0B;
    --bg: #F8F9FC;
    --card: #FFFFFF;
    --text: #1E1B4B;
    --muted: #6B7280;
    --border: #E5E7EB;
    --radius: 16px;
    --shadow: 0 2px 16px rgba(108,99,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--primary);
    color: white;
    padding: 20px 24px 40px;
  }
  header h1 { font-size: 1.5rem; font-weight: 700; }
  header p { opacity: 0.8; font-size: 0.9rem; margin-top: 4px; }

  /* ── Main Container ── */
  main {
    max-width: 860px;
    margin: -24px auto 0;
    padding: 0 16px 80px;
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }

  /* ── Summary Bar ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .summary-item {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    text-align: center;
  }
  .summary-item .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  .summary-item .amount { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
  .summary-item .sub { font-size: 0.75rem; color: var(--muted); }

  /* ── Month selector ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .toolbar h2 { font-size: 1rem; font-weight: 600; flex: 1; }
  select, input[type="month"], input[type="text"], input[type="number"], input[type="date"] {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 0.9rem;
    background: white;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input:focus { border-color: var(--primary); }

  /* ── Buttons ── */
  .btn {
    border: none;
    border-radius: 10px;
    padding: 9px 18px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: white; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-ghost { background: var(--primary-light); color: var(--primary); }
  .btn:hover { opacity: 0.88; }

  /* ── Add FAB ── */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    font-size: 1.6rem;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(108,99,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
    z-index: 100;
  }
  .fab:hover { transform: scale(1.1); }

  /* ── Expense List ── */
  .expense-list { display: flex; flex-direction: column; gap: 10px; }
  .expense-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: white;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    transition: border-color 0.2s;
  }
  .expense-item:hover { border-color: var(--primary); }
  .expense-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
    background: var(--primary-light);
  }
  .expense-body { flex: 1; min-width: 0; }
  .expense-desc { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .expense-meta { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .expense-amount { font-size: 1rem; font-weight: 700; color: var(--danger); white-space: nowrap; }
  .expense-actions { display: flex; gap: 6px; }
  .btn-sm {
    padding: 5px 10px;
    font-size: 0.75rem;
    border-radius: 8px;
  }

  /* ── Badge ── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    background: var(--primary-light);
    color: var(--primary);
  }
  .badge.line { background: #E7F9EF; color: #22C55E; }

  /* ── Category Chart ── */
  .cat-grid { display: flex; flex-direction: column; gap: 8px; }
  .cat-item { display: flex; align-items: center; gap: 10px; }
  .cat-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .cat-bar { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.6s; }
  .cat-name { font-size: 0.8rem; width: 80px; flex-shrink: 0; }
  .cat-amount { font-size: 0.8rem; font-weight: 600; white-space: nowrap; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    width: 100%;
    max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 { font-size: 1.1rem; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.9rem;
    background: white;
    color: var(--text);
    outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* ── Loader ── */
  .loader { text-align: center; padding: 40px; color: var(--muted); }
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 40px;
    font-size: 0.875rem;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .expense-actions { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <h1>💰 บันทึกค่าใช้จ่าย</h1>
  <p>จัดการรายจ่ายประจำวัน + เชื่อมต่อ LINE Bot</p>
</header>

<main>
  <!-- Summary Cards -->
  <div class="summary-grid">
    <div class="summary-item">
      <div class="label">วันนี้</div>
      <div class="amount" id="today-total">-</div>
      <div class="sub" id="today-count">0 รายการ</div>
    </div>
    <div class="summary-item">
      <div class="label">เดือนนี้</div>
      <div class="amount" id="month-total">-</div>
      <div class="sub" id="month-count">0 รายการ</div>
    </div>
    <div class="summary-item">
      <div class="label">เฉลี่ย/วัน</div>
      <div class="amount" id="avg-daily">-</div>
      <div class="sub">เดือนนี้</div>
    </div>
  </div>

  <!-- Category Chart -->
  <div class="card" id="cat-card">
    <div class="toolbar">
      <h2>📊 แบ่งตามหมวดหมู่</h2>
      <input type="month" id="month-select" />
    </div>
    <div class="cat-grid" id="cat-chart">
      <div class="loader">กำลังโหลด...</div>
    </div>
  </div>

  <!-- Expense List -->
  <div class="card">
    <div class="toolbar">
      <h2>📋 รายการค่าใช้จ่าย</h2>
      <select id="filter-cat">
        <option value="">ทุกหมวดหมู่</option>
      </select>
    </div>
    <div class="expense-list" id="expense-list">
      <div class="loader">กำลังโหลด...</div>
    </div>
    <div style="text-align:center; margin-top:12px;">
      <button class="btn btn-ghost" id="load-more" style="display:none">โหลดเพิ่มเติม</button>
    </div>
  </div>
</main>

<!-- FAB Add Button -->
<button class="fab" onclick="openModal()" title="เพิ่มรายการ">＋</button>

<!-- Add Expense Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">➕ เพิ่มค่าใช้จ่าย</h3>
    <input type="hidden" id="edit-id" />

    <div class="form-group">
      <label>จำนวนเงิน (บาท) *</label>
      <input type="number" id="f-amount" placeholder="เช่น 150" step="0.01" min="0.01" required />
    </div>
    <div class="form-group">
      <label>หมวดหมู่</label>
      <select id="f-category"></select>
    </div>
    <div class="form-group">
      <label>รายละเอียด</label>
      <input type="text" id="f-desc" placeholder="เช่น ข้าวกลางวัน" />
    </div>
    <div class="form-group">
      <label>ผู้รับ/ร้านค้า</label>
      <input type="text" id="f-recipient" placeholder="เช่น ร้านอาหาร ABC" />
    </div>
    <div class="form-group">
      <label>วันที่</label>
      <input type="date" id="f-date" required />
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveExpense()">บันทึก</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';
const CATEGORY_ICONS = {
  'อาหาร': '🍜', 'เดินทาง': '🚗', 'ช้อปปิ้ง': '🛍️',
  'ท่องเที่ยว': '✈️', 'ความบันเทิง': '🎬', 'สุขภาพ': '💊',
  'ค่าธรรมเนียม': '🏦', 'อื่นๆ': '📌',
};
const CAT_COLORS = ['#6C63FF','#22C55E','#F59E0B','#EF4444','#3B82F6','#EC4899','#14B8A6','#8B5CF6'];

let allExpenses = [];
let currentOffset = 0;
const PAGE_SIZE = 20;
let currentMonth = new Date().toISOString().slice(0, 7);
let categories = [];

// ── Init ──
window.onload = async () => {
  document.getElementById('month-select').value = currentMonth;
  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('month-select').addEventListener('change', e => {
    currentMonth = e.target.value;
    loadMonthSummary();
    loadCategoryChart();
  });
  document.getElementById('filter-cat').addEventListener('change', () => {
    currentOffset = 0;
    allExpenses = [];
    loadExpenses(true);
  });

  await loadCategories();
  await Promise.all([loadTodaySummary(), loadMonthSummary(), loadCategoryChart()]);
  await loadExpenses(true);
};

// ── API ──
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function loadCategories() {
  const data = await api('/api/categories');
  categories = data.categories;
  const sel = document.getElementById('f-category');
  const filterSel = document.getElementById('filter-cat');
  categories.forEach(c => {
    sel.innerHTML += `<option value="${c}">${CATEGORY_ICONS[c] || '•'} ${c}</option>`;
    filterSel.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

async function loadTodaySummary() {
  const d = await api('/api/summary/today');
  document.getElementById('today-total').textContent = fmt(d.total);
  document.getElementById('today-count').textContent = `${d.count} รายการ`;
}

async function loadMonthSummary() {
  const d = await api(`/api/summary/month?month=${currentMonth}`);
  document.getElementById('month-total').textContent = fmt(d.total);
  document.getElementById('month-count').textContent = `${d.count} รายการ`;

  // Avg daily
  const daysInMonth = new Date(currentMonth.slice(0,4), currentMonth.slice(5,7), 0).getDate();
  const today = new Date().toISOString().slice(0,7) === currentMonth
    ? new Date().getDate() : daysInMonth;
  const avg = today > 0 ? d.total / today : 0;
  document.getElementById('avg-daily').textContent = fmt(avg);
}

async function loadCategoryChart() {
  const d = await api(`/api/summary/month?month=${currentMonth}`);
  const el = document.getElementById('cat-chart');
  if (!d.by_category.length) { el.innerHTML = '<div class="empty">ยังไม่มีรายการในเดือนนี้</div>'; return; }
  const max = Math.max(...d.by_category.map(c => c.total));
  el.innerHTML = d.by_category.map((c, i) => `
    <div class="cat-item">
      <div class="cat-name">${CATEGORY_ICONS[c.category] || '•'} ${c.category}</div>
      <div class="cat-bar-wrap">
        <div class="cat-bar" style="width:${(c.total/max*100).toFixed(1)}%;background:${CAT_COLORS[i % CAT_COLORS.length]}"></div>
      </div>
      <div class="cat-amount">${fmt(c.total)}</div>
    </div>
  `).join('');
}

async function loadExpenses(reset = false) {
  if (reset) { allExpenses = []; currentOffset = 0; }
  const cat = document.getElementById('filter-cat').value;
  let url = `/api/expenses?limit=${PAGE_SIZE}&offset=${currentOffset}`;
  url += `&month=${currentMonth}`;
  if (cat) url += `&category=${encodeURIComponent(cat)}`;

  const data = await api(url);
  allExpenses = allExpenses.concat(data);
  renderExpenses();
  document.getElementById('load-more').style.display = data.length === PAGE_SIZE ? 'inline-block' : 'none';
  currentOffset += data.length;
}

document.getElementById('load-more').onclick = () => loadExpenses(false);

function renderExpenses() {
  const el = document.getElementById('expense-list');
  if (!allExpenses.length) { el.innerHTML = '<div class="empty">ยังไม่มีรายการค่าใช้จ่าย<br>กด + เพื่อเพิ่มรายการ</div>'; return; }
  el.innerHTML = allExpenses.map(e => `
    <div class="expense-item">
      <div class="expense-icon">${CATEGORY_ICONS[e.category] || '📌'}</div>
      <div class="expense-body">
        <div class="expense-desc">
          ${e.description || e.recipient || e.category}
          ${e.source === 'line_slip' ? '<span class="badge line">LINE</span>' : ''}
        </div>
        <div class="expense-meta">${formatDate(e.expense_date)} • ${e.category}${e.bank ? ' • '+e.bank : ''}</div>
      </div>
      <div class="expense-amount">฿${fmtNum(e.amount)}</div>
      <div class="expense-actions">
        <button class="btn btn-ghost btn-sm" onclick="editExpense(${e.id})">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteExpense(${e.id})">🗑️</button>
      </div>
    </div>
  `).join('');
}

// ── Modal ──
function openModal(prefill = {}) {
  document.getElementById('modal-title').textContent = '➕ เพิ่มค่าใช้จ่าย';
  document.getElementById('edit-id').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-recipient').value = '';
  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('f-category').value = 'อื่นๆ';
  if (prefill.id) {
    document.getElementById('modal-title').textContent = '✏️ แก้ไขรายการ';
    document.getElementById('edit-id').value = prefill.id;
    document.getElementById('f-amount').value = prefill.amount;
    document.getElementById('f-desc').value = prefill.description || '';
    document.getElementById('f-recipient').value = prefill.recipient || '';
    document.getElementById('f-date').value = prefill.expense_date;
    document.getElementById('f-category').value = prefill.category;
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function saveExpense() {
  const id = document.getElementById('edit-id').value;
  const amount = parseFloat(document.getElementById('f-amount').value);
  if (!amount || amount <= 0) { showToast('กรุณากรอกจำนวนเงิน'); return; }

  const body = {
    amount,
    category: document.getElementById('f-category').value,
    description: document.getElementById('f-desc').value || null,
    recipient: document.getElementById('f-recipient').value || null,
    expense_date: document.getElementById('f-date').value,
    source: 'manual',
  };

  try {
    if (id) {
      await api(`/api/expenses/${id}`, { method: 'PUT', body: JSON.stringify(body) });
      showToast('✅ แก้ไขรายการแล้ว');
    } else {
      await api('/api/expenses', { method: 'POST', body: JSON.stringify(body) });
      showToast('✅ เพิ่มรายการแล้ว');
    }
    closeModal();
    await Promise.all([loadTodaySummary(), loadMonthSummary(), loadCategoryChart()]);
    await loadExpenses(true);
  } catch (err) {
    showToast('❌ เกิดข้อผิดพลาด');
  }
}

async function editExpense(id) {
  const e = allExpenses.find(x => x.id === id);
  if (e) openModal(e);
}

async function deleteExpense(id) {
  if (!confirm('ยืนยันการลบรายการนี้?')) return;
  await api(`/api/expenses/${id}`, { method: 'DELETE' });
  showToast('🗑️ ลบรายการแล้ว');
  await Promise.all([loadTodaySummary(), loadMonthSummary(), loadCategoryChart()]);
  await loadExpenses(true);
}

// ── Utils ──
function fmt(n) { return '฿' + fmtNum(n); }
function fmtNum(n) { return Number(n).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
</script>
</body>
</html>
